spring.application.name=webshop-api

spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/webshop}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# JWT Config 
jwt.secret=webshop_secret_key_needs_to_be_at_least_256_bits_long_for_hs256_algorithm
jwt.expiration=86400000

# Mail Config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=placeholder@gmail.com
spring.mail.password=placeholder
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
